name: CI

# When this workflow runs:
#  - on every push to any branch
#  - on every pull request targeting main
on:
  push:
  pull_request:
    branches: [main]

# Cancel in-progress runs of the same workflow on the same ref when a new push lands.
# Saves Actions minutes and gives you faster feedback on the latest commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest

    steps:
      # Pulls your repo onto the runner. Without this, the runner has nothing to work with.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Installs Node 20 (matches what Vercel uses by default for Next 16).
      # `cache: npm` reuses ~/.npm between runs based on your package-lock.json hash —
      # cuts install time from ~45s to ~10s on cache hits.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # `npm ci` is like `npm install` but stricter: it reads only package-lock.json
      # (faster, deterministic, fails if lock is out of sync). Always use `ci` in CI.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
